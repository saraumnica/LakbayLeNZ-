<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Booking</title>

<!-- Flatpickr -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 20px;
}

.times {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 20px;
}

button {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  cursor: pointer;
  background: white;
}

button:hover {
  background: #007bff;
  color: white;
}

.selected {
  background: #007bff;
  color: white;
}

#confirm {
  margin-top: 20px;
  padding: 12px 20px;
  display: none;
}

#summary {
  margin-top: 20px;
  font-size: 16px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Select Booking Dates & Time</h2>

<input type="text" id="datePicker" placeholder="Select Date Range">

<div class="times" id="timeSlots"></div>

<div id="summary"></div>

<button id="confirm">Confirm Booking</button>

<script>
const times = [
  "8:00 AM","9:00 AM","10:00 AM",
  "11:00 AM","12:00 PM","1:00 PM",
  "2:00 PM","3:00 PM","4:00 PM"
];

const DAILY_RATE = 500;
const HOURLY_RATE = DAILY_RATE / 24;

const timeContainer = document.getElementById("timeSlots");
const confirmBtn = document.getElementById("confirm");
const summary = document.getElementById("summary");

let selectedTime = null;
let selectedDates = [];

// Convert time string to hours
function parseTime(timeStr) {
  const [time, modifier] = timeStr.split(" ");
  let [hours] = time.split(":");
  hours = parseInt(hours);
  if (modifier === "PM" && hours !== 12) hours += 12;
  if (modifier === "AM" && hours === 12) hours = 0;
  return hours;
}

// Create time buttons
times.forEach(time => {
  const btn = document.createElement("button");
  btn.textContent = time;

  btn.onclick = () => {
    document.querySelectorAll(".times button").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedTime = time;
    updateSummary();
  };

  timeContainer.appendChild(btn);
});

// Flatpickr date range picker
flatpickr("#datePicker", {
  mode: "range",
  minDate: "today",
  dateFormat: "Y-m-d",
  onChange: function(dates) {
    selectedDates = dates;
    updateSummary();
  }
});

// Update summary and price
function updateSummary() {
  if (selectedDates.length === 2 && selectedTime) {
    const start = new Date(selectedDates[0]);
    const end = new Date(selectedDates[1]);
    const hour = parseTime(selectedTime);
    start.setHours(hour);
    end.setHours(hour);

    const diffTime = end - start;
    const hours = diffTime / (1000 * 60 * 60);
    const totalCost = hours * HOURLY_RATE;

    summary.innerHTML = `
      Duration: ${hours} hours<br>
      Rate: ₱${HOURLY_RATE.toFixed(2)}/hour<br>
      Total: ₱${totalCost.toFixed(2)}
    `;

    confirmBtn.style.display = "block";
  } else {
    summary.innerHTML = "";
    confirmBtn.style.display = "none";
  }
}

// Confirm booking
confirmBtn.onclick = () => {
  const start = new Date(selectedDates[0]);
  const end = new Date(selectedDates[1]);
  const hour = parseTime(selectedTime);
  start.setHours(hour);
  end.setHours(hour);

  const diffTime = end - start;
  const hours = diffTime / (1000 * 60 * 60);
  const totalCost = hours * HOURLY_RATE;

  const lateHours = parseFloat(prompt("Enter late return hours (0 if none):", "0")) || 0;
  const penalty = lateHours * HOURLY_RATE;
  const finalTotal = totalCost + penalty;

  alert(`Booking confirmed:
Start: ${start}
End: ${end}

Booked Hours: ${hours}
Base Cost: ₱${totalCost.toFixed(2)}

Late Hours: ${lateHours}
Penalty: ₱${penalty.toFixed(2)}

Final Total: ₱${finalTotal.toFixed(2)}
`);
};
</script>

</body>
</html>
